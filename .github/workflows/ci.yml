name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Verify site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run site checks
        run: node tools/verify-site.mjs

  api-health:
    name: Payment API health
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push'
    steps:
      - name: Wait for Vercel deploy, then probe create-order
        run: |
          sleep 60
          for i in 1 2 3; do
            code=$(curl -s -o /tmp/resp.json -w '%{http_code}' \
              -X POST https://the-long-light-xi.vercel.app/api/create-order \
              -H 'Content-Type: application/json' \
              -H 'Origin: https://beginnerns.github.io' \
              -d '{"photo":"assets/img/ci-health-check.jpg","title":"CI health check"}')
            echo "attempt $i: HTTP $code"; cat /tmp/resp.json; echo
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 30
          done
          echo "Payment API is not healthy after deploy"; exit 1
